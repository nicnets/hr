version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-portal-app:latest
    container_name: hr-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/hr-portal.db
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - CRON_SECRET=${CRON_SECRET}
      - COMPANY_NAME=${COMPANY_NAME}
    volumes:
      # Use named volumes for Portainer (better persistence)
      - hr-portal-data:/app/data
      - hr-portal-backups:/app/backups
    networks:
      - hr-portal-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hr-portal-network:
    driver: bridge

volumes:
  hr-portal-data:
    driver: local
  hr-portal-backups:
    driver: local
