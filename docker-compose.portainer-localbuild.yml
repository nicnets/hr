version: '3.8'

# This version is for Portainer Web Editor (not GitOps)
# It builds the image locally instead of pulling from registry
# Use this if you don't want to use GHCR

services:
  app:
    build:
      context: https://github.com/nicnets/hr.git#main
      dockerfile: Dockerfile
    container_name: hr-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/hr-portal.db
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - COMPANY_NAME=${COMPANY_NAME:-ForceFriction AI}
      - CRON_SECRET=${CRON_SECRET}
    volumes:
      - hr-portal-data:/app/data
      - hr-portal-backups:/app/backups
    networks:
      - hr-portal-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hr-portal-network:
    driver: bridge

volumes:
  hr-portal-data:
  hr-portal-backups:
