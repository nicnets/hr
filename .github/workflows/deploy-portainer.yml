name: Deploy to Portainer

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Option A: Trigger Portainer Stack Webhook (if using GitOps in Portainer)
  trigger-portainer-webhook:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Stack Update
        if: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
          echo "✅ Portainer stack update triggered"

  # Option B: Use Portainer API to redeploy (if using Docker Hub image)
  redeploy-via-api:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via Portainer API
        if: ${{ secrets.PORTAINER_URL != '' && secrets.PORTAINER_API_KEY != '' && secrets.PORTAINER_STACK_ID != '' }}
        run: |
          curl -X POST "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{
              "env": [],
              "prune": true,
              "pullImage": true,
              "repositoryAuthentication": false,
              "repositoryReferenceName": "refs/heads/main"
            }' \
            --fail \
            --silent \
            --show-error
          echo "✅ Portainer stack redeployed via API"
